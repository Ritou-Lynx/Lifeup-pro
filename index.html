<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script>

window.onload = function(){

  const params = new URLSearchParams(window.location.search);

  const action = params.get("action");
  const id = params.get("id");

  const url = "lifeup://api?action=" + action + "&id=" + id;

  window.location.href = url;

}

</script>

</head>

<body>
Opening LifeUp...
</body>
</html>
