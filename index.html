<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>LifeUp Redirector</title>
</head>
<body>
    <p>正在触发 LifeUp 功能...</p>
    <script>
        // 获取 URL 参数
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type'); // 任务(task)还是番茄钟(pomo)
        const name = encodeURIComponent(params.get('name')); // 任务或番茄钟的名称

        let lifeupUrl = "";

        if (type === 'task') {
            // 完成任务 API
            lifeupUrl = `lifeup://api/tasks/complete?name=${name}`;
        } else if (type === 'pomo') {
            // 开始番茄钟 API
            lifeupUrl = `lifeup://api/pomodoro/start?name=${name}`;
        }

        if (lifeupUrl) {
            // 执行跳转
            window.location.href = lifeupUrl;
            
            // 2秒后自动尝试关闭页面（取决于浏览器策略，有时需要手动点击一下）
            setTimeout(() => {
                window.close();
            }, 2000);
        } else {
            document.body.innerHTML = "参数错误，请检查 URL。";
        }
    </script>
</body>
</html>
