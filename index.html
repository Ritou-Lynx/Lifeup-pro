<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script>

function getParam(name){
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

window.onload = function(){

  const action = getParam("action");
  const task = getParam("task");
  const text = getParam("text");

  let lifeupURL = "lifeup://api?action=" + action;

  if(task){
    lifeupURL += "&task_name=" + task;
  }

  if(text){
    lifeupURL += "&text=" + text;
  }

  window.location.href = lifeupURL;

}

</script>

</head>

<body>
Opening LifeUp...
</body>
</html>
